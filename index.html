            <div class="nav-item" onclick="headerTab('3')">样点资料</div>
        </div>
        <div class="main-warp">
            <div class="search-header">江西省粮食生产大数据地图全貌</div>
            <div class="search-box">
                <div class="main-left-input">
                    <select name="filter" id="province" onchange="selectProvince()">
                        <option value='0'>省</option>
                        <option value='1'>江西省</option>
                    </select>
                    <select name="filter" id="city" onchange="selectCity()" disabled>
                        <option value='0'>市</option>
                        <option value='2'>南昌市</option>
                        <option value='3'>景德镇市</option>
                        <option value='4'>萍乡市</option>
                        <option value='5'>九江市</option>
                        <option value='6'>新余市</option>
                        <option value='7'>鹰潭市</option>
                    </select>
                </div>
                <div class="main-left-input">
                    <select name="filter" id="area" disabled>
                        <option value='0'>区</option>
                    </select>
                    <select name="filter" id="year">
                        <option value='0'>年</option>
                        <option value='1'>2001</option>
                        <option value='2'>2002</option>
                        <option value='3'>2003</option>
                        <option value='4'>2004</option>
                        <option value='5'>2005</option>
                        <option value='6'>2006</option>
                        <option value='7'>2007</option>
                    </select>
                </div>
                <div class="search-btn" onclick="search()">查询</div>
            </div>
            <div class="main-map">
                <img src="./img/map.png" alt="">
            </div>
        </div>
        <div class="main-warp">
            <div class="search-header">江西省粮食生产大数据分析</div>
            <div class="pie-box">
                <div class="pie-data" >
                    <div id="mainBar" style="width: 100%;height: 100%;font-size: 16px;margin: 0 auto;"></div>
                </div>
                <div class="pie-data-detail">
                    <div>晚稻省份:</div>
                    <div>新余市 12%</div>
                    <div>赣州市 42%</div>
                </div>
                <!-- <div class="main-right-data" id="serious">

                </div>

                </div>
                <div class="main-right-data" id="part">
                    <span class="main-right-point" style="background: #EB6100;"></span>
                </div> -->
            </div>
        </div>
        <div id="mainTable" class="main-warp main-right-table">
            <div class="search-header">江西省粮食生产大数据分析</div>
            <div class="data-content-header data-header">

                <div>晚稻(亩)</div>
